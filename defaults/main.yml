# Release name to manage.
helm_cilium_helm_release_name: cilium

# Kubernetes namespace where the chart should be installed.
helm_cilium_helm_release_namespace: kube-system

# Value to pass to chart.
helm_cilium_helm_release_values:
  k8sServiceHost: "{{ hostvars[groups['kube_master'][0]].ansible_facts['default_ipv4'].address }}"
  k8sServicePort: 6443
  cluster:
    name: "{{ hostvars[groups['kube_master'][0]].ansible_facts['machine_id'] }}"
    id: 0
  image:
    repository: quay.io/cilium/cilium
    pullPolicy: IfNotPresent
    useDigest: false
  securityContext:
    allowPrivilegeEscalation: true
    privileged: true
  bpf:
    preallocateMaps: false
    masquerade: false
  cleanBpfState: false
  cleanState: false
  waitForKubeProxy: true
  cni:
    install: true
    uninstall: true
    chainingMode: portmap
    exclusive: true
    confPath: /etc/containers/networks
    binPath: /opt/cni/bin
  endpointRoutes:
    enabled: false
  socketLB:
    enabled: true
  certgen:
    image:
      repository: quay.io/cilium/certgen
      pullPolicy: IfNotPresent
      useDigest: false
  hubble:
    enabled: false
    relay:
      image:
        repository: quay.io/cilium/hubble-relay
        pullPolicy: IfNotPresent
        useDigest: false
    backend:
      image:
        repository: quay.io/cilium/hubble-ui-backend
        pullPolicy: IfNotPresent
        useDigest: false
    frontend:
      image:
        repository: quay.io/cilium/hubble-ui
        pullPolicy: IfNotPresent
        useDigest: false
  ipam:
    mode: cluster-pool
    operator:
      clusterPoolIPv4PodCIDRList:
        - 10.233.64.0/18
      clusterPoolIPv4MaskSize: 24
  ipv4:
    enabled: true
  ipv6:
    enabled: false
  k8s:
    requireIPv4PodCIDR: false
    requireIPv6PodCIDR: false
    serviceProxyName: nonexistent
  kubeProxyReplacement: false
  localRedirectPolicies:
    enabled: true
  enableIPv4Masquerade: true
  enableIPv6Masquerade: false
  enableIPv4BIGTCP: false
  enableIPv6BIGTCP: false
  enableTunnelBIGTCP: false
  loadBalancer:
    protocolDifferentiation:
      enabled: true
  nodePort:
    enabled: true
  envoy:
    enabled: false
    image:
      repository: quay.io/cilium/cilium-envoy
      pullPolicy: IfNotPresent
      useDigest: false
  sessionAffinity: true
  sleepAfterInit: false
  tunnelProtocol: vxlan
  routingMode: tunnel
  operator:
    enabled: true
    image:
      repository: quay.io/cilium/operator
      pullPolicy: IfNotPresent
      useDigest: false
    replicas: 1
    securityContext:
      allowPrivilegeEscalation: true
      privileged: true
  nodeinit:
    enabled: true
    image:
      repository: quay.io/cilium/startup-script
      pullPolicy: IfNotPresent
      useDigest: false
    securityContext:
      allowPrivilegeEscalation: true
      privileged: true
  preflight:
    enabled: false
    image:
      repository: quay.io/cilium/cilium
      pullPolicy: IfNotPresent
      useDigest: false
    envoy:
      image:
        repository: quay.io/cilium/cilium-envoy
        pullPolicy: IfNotPresent
        useDigest: false
  clustermesh:
    apiserver:
      image:
        repository: quay.io/cilium/clustermesh-apiserver
        pullPolicy: IfNotPresent
        useDigest: false
  sctp:
    enabled: true
